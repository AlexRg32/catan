services:
  postgres:
    image: postgres:16-alpine
    container_name: catan-postgres
    environment:
      POSTGRES_DB: catan
      POSTGRES_USER: catan
      POSTGRES_PASSWORD: catan
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U catan -d catan"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: catan-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build:
      context: ../..
      dockerfile: apps/server/Dockerfile
    container_name: catan-server
    environment:
      SERVER_PORT: 8080
      DB_URL: jdbc:postgresql://postgres:5432/catan
      DB_USER: catan
      DB_PASSWORD: catan
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    container_name: catan-web
    ports:
      - "5173:80"
    depends_on:
      server:
        condition: service_started

volumes:
  postgres-data:
  redis-data:

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: catan-ingress
spec:
  rules:
    - host: catan.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: catan-web
                port:
                  number: 80
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: catan-server
                port:
                  number: 8080

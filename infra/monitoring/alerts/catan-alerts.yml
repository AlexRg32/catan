groups:
  - name: catan-online-alerts
    rules:
      - alert: CatanHighValidationErrorRate
        expr: sum(rate(catan_command_validation_failures_total[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High validation error rate"
          description: "Validation failures are above expected baseline for 5 minutes."

      - alert: CatanHighCommandLatencyP95
        expr: histogram_quantile(0.95, sum(rate(catan_command_latency_seconds_bucket[5m])) by (le)) > 1.2
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "High command latency p95"
          description: "Command latency p95 exceeded 1.2s during the last 10 minutes."
